version: '3.8'

services:

  postgres:
    image: postgres:16-alpine
    container_name: techfix_db
    environment:
      POSTGRES_DB: techfix_users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - techfix_postgres_data:/var/lib/postgresql/data
    networks:
      - techfix_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build: .
    container_name: techfix_user_service
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: techfix_usuarios
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - techfix_net
    restart: unless-stopped

volumes:
  techfix_postgres_data:

networks:
  techfix_net:
    driver: bridge