version: '3.8'

services:

  payment-service:
    build: .
    container_name: techfix_payment_service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_NAME: techfix_payment
      DB_USER: techfix_admin
      DB_PASSWORD: TechFix2024!
      SERVER_PORT: 8081
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

networks:
  default:
    driver: bridge
