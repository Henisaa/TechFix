spring.application.name=techfix-user-service
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:techfix_usuarios}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
server.port=${SERVER_PORT:8080}
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
spring.jpa.defer-datasource-initialization=true
admin.username=${ADMIN_USERNAME:admin}
admin.email=${ADMIN_EMAIL:admin@techfix.cl}
admin.password=${ADMIN_PASSWORD}
admin.fullName=${ADMIN_FULL_NAME:Administrador TechFix}
internal.api.secret=${INTERNAL_API_SECRET:techfix-internal-secret-2024}
jwt.secret=${JWT_SECRET:cGFyYWJpZW5vZGViZXJpYXNlc3RhcmJhc2U2NHRlY2hmaXgK}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
