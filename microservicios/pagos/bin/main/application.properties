spring.application.name=techfix-payment
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:techfix_payment}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
server.port=${SERVER_PORT:8081}
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.app.name=TechFix Payment Microservice
management.info.app.version=1.0.0
